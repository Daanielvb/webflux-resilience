spring.application.name=reactive
logging.level.root=INFO

# built-in logging via actuator - exposes /actuator/retryevents

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.webflux.problemdetails.enabled=true

posts.client.base-url=https://jsonplaceholder.typicode.com/v2/

# Resilience4j retry config for postsRetry
resilience4j.retry.metrics.enabled=true
resilience4j.retry.instances.postsRetry.event-consumer-buffer-size=50
resilience4j.retry.instances.postsRetry.max-attempts=3
resilience4j.retry.instances.postsRetry.wait-duration=500ms
resilience4j.retry.instances.postsRetry.enable-exponential-backoff=true
resilience4j.retry.instances.postsRetry.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.postsRetry.exponential-max-wait-duration=5s
resilience4j.retry.instances.postsRetry.randomized-wait-factor=0.3
resilience4j.retry.instances.postsRetry.enableRandomizedWait=true

resilience4j.circuitbreaker.metrics.enabled=true
resilience4j.circuitbreaker.instances.postsCb.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.postsCb.slidingWindowSize=10
resilience4j.circuitbreaker.instances.postsCb.failureRateThreshold=30
resilience4j.circuitbreaker.instances.postsCb.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.postsCb.slowCallDurationThreshold=3s
resilience4j.circuitbreaker.instances.postsCb.permittedNumberOfCallsInHalfOpenState=5
resilience4j.circuitbreaker.instances.postsCb.minimumNumberOfCalls=3

# Custom HTTP status properties
app.retry.status-to-retry=500,502,503,504,404